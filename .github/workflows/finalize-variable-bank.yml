name: Finalize variable stage bank

on:
  push:
    branches:
      - agent/tomatooku-variable-final-bank

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/tomatooku-variable-final-bank

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate completed bank
        run: npm run gen:v2:variable-final-bank

      - name: Commit completed bank and remove one-time workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated/variable-stage-bank-v2.json
          git rm .github/workflows/finalize-variable-bank.yml
          git commit -m "data: add completed variable-stage bank"
          git push origin HEAD:agent/tomatooku-variable-final-bank
