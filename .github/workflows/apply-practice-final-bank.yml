name: Apply practice final bank connection

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/tomatooku-practice-final-bank' || github.ref_name == 'agent/tomatooku-practice-final-bank'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/tomatooku-practice-final-bank

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply connection patch
        run: python3 scripts/apply_practice_final_bank_connection.py

      - name: Regenerate active practice bank
        run: npm run gen:v2:variable-final-bank

      - name: Run static contracts
        run: npm test

      - name: Commit connection and remove one-time files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/game.js src/main.js src/stage-bank-config.js \
            scripts/generator-v2/variable-final-bank.js \
            scripts/variable-stage-final-bank.test.js \
            generated/variable-stage-bank-v2.json package.json \
            .github/workflows/ci.yml src/practice-stage-bank.js \
            scripts/practice-stage-bank.test.js scripts/practice-stage-bank.e2e.js
          git rm scripts/apply_practice_final_bank_connection.py \
            .github/workflows/apply-practice-final-bank.yml
          if [ -f review/.practice-final-bank-trigger ]; then
            git rm review/.practice-final-bank-trigger
          fi
          git commit -m "feat: connect final bank to random practice"
          git push origin HEAD:agent/tomatooku-practice-final-bank
