name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tomatooku-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Static and browser tests
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run static and contract tests
        run: npm test

      - name: Run exhaustive fixed-size feasibility audit
        run: npm run audit:v2:bank

      - name: Run variable-region threshold feasibility audit
        run: npm run audit:v2:variable-regions

      - name: Verify variable feasibility manifest is reproducible
        run: git diff --exit-code -- generated/stage-bank-variable-feasibility-v2.json

      - name: Regenerate variable candidate pool
        run: npm run gen:v2:variable-pool

      - name: Verify variable candidate pool is reproducible
        run: git diff --exit-code -- generated/variable-stage-candidate-pool-v2.json

      - name: Regenerate completed variable-stage bank
        run: npm run gen:v2:variable-final-bank

      - name: Verify completed variable-stage bank is reproducible
        run: git diff --exit-code -- generated/variable-stage-bank-v2.json

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run iPhone SE browser E2E
        run: npm run e2e

      - name: Run review tool iPhone SE E2E
        run: npm run e2e:review
