name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tomatooku-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Apply documentation sync
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          python3 scripts/sync_variable_pool_docs.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/IMPLEMENTATION_PLAN_v2.md
          git rm scripts/sync_variable_pool_docs.py .github/workflows/sync-variable-pool-docs.yml
          git commit -m "docs: record variable candidate pool results"
          git push origin HEAD:${{ github.head_ref }}
