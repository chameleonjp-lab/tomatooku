name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tomatooku-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate candidate pool manifest
        run: npm run gen:v2:variable-pool

      - name: Commit manifest
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          if [ -n "$(git status --porcelain -- generated/variable-stage-candidate-pool-v2.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add generated/variable-stage-candidate-pool-v2.json
            git commit -m "data: add balanced variable candidate pool"
            git push origin HEAD:${{ github.head_ref }}
          fi
