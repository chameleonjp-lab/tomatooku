name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tomatooku-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Static and browser tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run static and contract tests
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee npm-test-variable-pool.log

      - name: Upload static test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-test-variable-pool-log
          path: npm-test-variable-pool.log
          if-no-files-found: error
          retention-days: 7

      - name: Run exhaustive fixed-size feasibility audit
        run: npm run audit:v2:bank

      - name: Run variable-region threshold feasibility audit
        run: npm run audit:v2:variable-regions

      - name: Verify variable-region manifest is reproducible
        run: git diff --exit-code -- generated/stage-bank-variable-feasibility-v2.json

      - name: Generate balanced variable candidate pool
        run: npm run gen:v2:variable-pool

      - name: Upload variable candidate pool artifact
        uses: actions/upload-artifact@v4
        with:
          name: variable-stage-candidate-pool-v2
          path: generated/variable-stage-candidate-pool-v2.json
          if-no-files-found: error
          retention-days: 7

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run iPhone SE browser E2E
        run: npm run e2e
