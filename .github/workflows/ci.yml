          git add README.md docs/IMPLEMENTATION_PLAN_v2.md .github/workflows/ci.yml
          git commit -m "docs: finalize variable-stage contract package"
          git push origin HEAD:${{ github.head_ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run static and contract tests
        run: npm test

      - name: Run exhaustive fixed-size feasibility audit
        run: npm run audit:v2:bank

      - name: Run variable-region threshold feasibility audit
        run: npm run audit:v2:variable-regions

      - name: Verify variable-region manifest is reproducible
        run: git diff --exit-code -- generated/stage-bank-variable-feasibility-v2.json

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run iPhone SE browser E2E
        run: npm run e2e
