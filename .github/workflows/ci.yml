name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tomatooku-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Static and browser tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run static and contract tests
        run: npm test

      - name: Run exhaustive v2 stage-bank feasibility audit
        run: npm run audit:v2:bank

      - name: Upload feasibility manifest
        uses: actions/upload-artifact@v4
        with:
          name: stage-bank-feasibility-v2
          path: generated/stage-bank-feasibility-v2.json
          if-no-files-found: error
          retention-days: 7

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run iPhone SE browser E2E
        run: npm run e2e
