name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tomatooku-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Correct candidate pool distance field
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/generator-v2/variable-pool.js')
          text = path.read_text()
          old = 'minimumParrPairDistance'
          new = 'minimumPairDistance'
          if old in text:
              path.write_text(text.replace(old, new))
          elif new not in text:
              raise SystemExit('distance field target not found')
          PY
          if [ -n "$(git status --porcelain -- scripts/generator-v2/variable-pool.js)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add scripts/generator-v2/variable-pool.js
            git commit -m "fix: correct candidate pool distance field"
            git push origin HEAD:${{ github.head_ref }}
          fi
