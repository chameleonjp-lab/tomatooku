name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tomatooku-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Static and browser tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run static and contract tests
        run: npm test

      - name: Run exhaustive fixed-size feasibility audit
        run: npm run audit:v2:bank

      - name: Upload fixed-size feasibility manifest
        uses: actions/upload-artifact@v4
        with:
          name: stage-bank-feasibility-v2
          path: generated/stage-bank-feasibility-v2.json
          if-no-files-found: error
          retention-days: 7

      - name: Run variable-region threshold feasibility audit
        run: npm run audit:v2:variable-regions

      - name: Emit compressed variable-region manifest diagnostic
        shell: bash
        run: |
          echo VARIABLE_MANIFEST_GZIP_BASE64_BEGIN
          gzip -c generated/stage-bank-variable-feasibility-v2.json | base64 -w0
          echo
          echo VARIABLE_MANIFEST_GZIP_BASE64_END

      - name: Upload variable-region feasibility manifest
        uses: actions/upload-artifact@v4
        with:
          name: stage-bank-variable-feasibility-v2
          path: generated/stage-bank-variable-feasibility-v2.json
          if-no-files-found: error
          retention-days: 7

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run iPhone SE browser E2E
        run: npm run e2e
