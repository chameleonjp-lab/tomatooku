name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tomatooku-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Remove duplicate allocator definition
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/generator-v2/variable-pool.js')
          text = path.read_text()
          needle = 'function allocateClassSelectionTargets('
          positions = []
          cursor = 0
          while True:
              index = text.find(needle, cursor)
              if index < 0:
                  break
              positions.append(index)
              cursor = index + len(needle)
          if len(positions) > 1:
              start = positions[1]
              end = text.index('export function buildVariableStageCandidatePool', start)
              path.write_text(text[:start] + text[end:])
          elif len(positions) != 1:
              raise SystemExit(f'unexpected allocator count: {len(positions)}')
          PY
          if [ -n "$(git status --porcelain -- scripts/generator-v2/variable-pool.js)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add scripts/generator-v2/variable-pool.js
            git commit -m "fix: remove duplicate class allocator"
            git push origin HEAD:${{ github.head_ref }}
          fi
