name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tomatooku-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Static and browser tests
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Delay Blob URL cleanup until download starts
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('review/variable-stage-review.js')
          text = path.read_text()
          old = '  URL.revokeObjectURL(url);'
          new = '  setTimeout(() => URL.revokeObjectURL(url), 1000);'
          if old in text:
              path.write_text(text.replace(old, new, 1))
          elif new not in text:
              raise SystemExit('download cleanup target not found')
          PY
          if [ -n "$(git status --porcelain -- review/variable-stage-review.js)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add review/variable-stage-review.js
            git commit -m "fix: keep review export URL alive for download"
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run static and contract tests
        run: npm test

      - name: Run exhaustive fixed-size feasibility audit
        run: npm run audit:v2:bank

      - name: Run variable-region threshold feasibility audit
        run: npm run audit:v2:variable-regions

      - name: Verify variable feasibility manifest is reproducible
        run: git diff --exit-code -- generated/stage-bank-variable-feasibility-v2.json

      - name: Regenerate variable candidate pool
        run: npm run gen:v2:variable-pool

      - name: Verify variable candidate pool is reproducible
        run: git diff --exit-code -- generated/variable-stage-candidate-pool-v2.json

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run iPhone SE browser E2E
        run: npm run e2e

      - name: Run review tool iPhone SE E2E
        run: npm run e2e:review
