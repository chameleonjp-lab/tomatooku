name: Sync variable review tool docs

on:
  pull_request:
    paths:
      - "scripts/sync_variable_review_tool_docs.py"
      - ".github/workflows/sync-variable-review-tool-docs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Apply documentation sync
        shell: bash
        run: |
          python3 scripts/sync_variable_review_tool_docs.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/IMPLEMENTATION_PLAN_v2.md
          git rm scripts/sync_variable_review_tool_docs.py .github/workflows/sync-variable-review-tool-docs.yml
          git commit -m "docs: record human review tool workflow"
          git push origin HEAD:${{ github.head_ref }}
