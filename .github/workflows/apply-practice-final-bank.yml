name: Apply practice final bank connection

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/tomatooku-practice-final-bank' || github.ref_name == 'agent/tomatooku-practice-final-bank'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/tomatooku-practice-final-bank

      - name: Detect already-applied patch
        id: detect
        shell: bash
        run: |
          if grep -q 'LEGACY_PRACTICE_STAGE_SETS' src/game.js; then
            echo "applied=true" >> "$GITHUB_OUTPUT"
          else
            echo "applied=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.detect.outputs.applied == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.detect.outputs.applied == 'false'
        run: npm ci

      - name: Apply connection patch
        if: steps.detect.outputs.applied == 'false'
        run: python3 scripts/apply_practice_final_bank_connection.py

      - name: Regenerate active practice bank
        if: steps.detect.outputs.applied == 'false'
        run: npm run gen:v2:variable-final-bank

      - name: Run static contracts
        if: steps.detect.outputs.applied == 'false'
        run: npm test

      - name: Commit connection
        if: steps.detect.outputs.applied == 'false'
        shell: bash
        run: |
          set -euxo pipefail
          git restore .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/game.js src/main.js src/stage-bank-config.js \
            scripts/generator-v2/variable-final-bank.js \
            scripts/variable-stage-final-bank.test.js \
            generated/variable-stage-bank-v2.json package.json \
            src/practice-stage-bank.js scripts/practice-stage-bank.test.js \
            scripts/practice-stage-bank.e2e.js
          git status --short
          git commit -m "feat: connect final bank to random practice"
          git push origin HEAD:agent/tomatooku-practice-final-bank
